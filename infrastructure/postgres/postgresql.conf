# PostgreSQL Configuration for Flash Arbitrage Bot
# Performance-tuned for trading workloads

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 100

# Memory Settings (optimized for trading bot)
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 4MB
maintenance_work_mem = 64MB

# WAL Settings (Write-Ahead Logging)
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

# Query Planner Settings
random_page_cost = 1.1
# effective_io_concurrency disabled on macOS
# effective_io_concurrency = 200

# Logging Settings
log_statement = 'none'
log_min_duration_statement = 1000
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Security Settings
ssl = off
password_encryption = scram-sha-256

# Performance Monitoring
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
