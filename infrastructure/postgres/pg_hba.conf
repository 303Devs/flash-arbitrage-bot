# PostgreSQL Client Authentication Configuration
# For Flash Arbitrage Bot Development Environment

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections (trust for development)
local   all             all                                     trust

# IPv4 local connections
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Docker network connections (172.20.0.0/16)
host    all             all             172.20.0.0/16           scram-sha-256

# Allow connections for specific users with password
host    flash_arbitrage_bot    flash_arbitrage_user    127.0.0.1/32    scram-sha-256
host    grafana_db             grafana_user            127.0.0.1/32    scram-sha-256
host    postgres               postgres_exporter       127.0.0.1/32    scram-sha-256
