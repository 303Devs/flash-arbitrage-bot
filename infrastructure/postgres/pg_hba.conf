# PostgreSQL Client Authentication Configuration
# For Flash Arbitrage Bot - PRODUCTION-READY
# Follows PostgreSQL security best practices

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# =============================================================================
# LOCAL CONNECTIONS
# =============================================================================
# Unix domain socket connections (allow initialization)
local   all             all                                     scram-sha-256

# =============================================================================
# IPv4/IPv6 CONNECTIONS  
# =============================================================================
# Localhost connections (secure)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# =============================================================================
# DOCKER NETWORK CONNECTIONS
# =============================================================================
# Docker internal network (172.20.0.0/16 as defined in docker-compose.yml)
host    all             all             172.20.0.0/16           scram-sha-256

# Docker host connections (for development - restrict in production)
# This allows connections from Docker host to container
host    all             all             192.168.65.0/24         scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256

# =============================================================================
# APPLICATION-SPECIFIC CONNECTIONS
# =============================================================================
# Flash Arbitrage Bot connections
host    flash_arbitrage_bot    flash_arbitrage_user    127.0.0.1/32        scram-sha-256
host    flash_arbitrage_bot    flash_arbitrage_user    172.20.0.0/16       scram-sha-256
host    flash_arbitrage_bot    flash_arbitrage_user    192.168.65.0/24     scram-sha-256
host    flash_arbitrage_bot    flash_arbitrage_user    192.168.0.0/16      scram-sha-256

# Grafana connections
host    grafana_db             grafana_user            127.0.0.1/32        scram-sha-256
host    grafana_db             grafana_user            172.20.0.0/16       scram-sha-256

# PostgreSQL exporter connections (monitoring)
host    postgres               postgres_exporter       127.0.0.1/32        scram-sha-256
host    postgres               postgres_exporter       172.20.0.0/16       scram-sha-256
host    flash_arbitrage_bot    postgres_exporter       127.0.0.1/32        scram-sha-256
host    flash_arbitrage_bot    postgres_exporter       172.20.0.0/16       scram-sha-256

# =============================================================================
# SECURITY NOTES:
# - peer: Uses OS user authentication (most secure for local)
# - scram-sha-256: Modern password authentication (recommended)
# - trust: No authentication (NEVER use in production)
# - md5: Legacy password auth (avoid in new installations)
# =============================================================================
