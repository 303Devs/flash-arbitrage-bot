# Grafana Configuration for Flash Arbitrage Bot
# Production-ready configuration following Critical Principles
# ALL VALUES ENVIRONMENT-DRIVEN - NO HARDCODED VALUES

[paths]
data = ${GRAFANA_PATHS_DATA:-/var/lib/grafana}
logs = ${GRAFANA_PATHS_LOGS:-/var/log/grafana}
plugins = ${GRAFANA_PATHS_PLUGINS:-/var/lib/grafana/plugins}
provisioning = ${GRAFANA_PATHS_PROVISIONING:-/etc/grafana/provisioning}

[server]
protocol = ${GRAFANA_PROTOCOL:-http}
http_addr = 
http_port = ${GRAFANA_HTTP_PORT:-3000}
domain = ${GRAFANA_DOMAIN:-localhost}
root_url = ${GRAFANA_ROOT_URL:-http://localhost:3000}
serve_from_sub_path = false
enable_gzip = true
static_root_path = public
router_logging = false

[database]
type = ${GRAFANA_DATABASE_TYPE:-sqlite3}
path = ${GRAFANA_DATABASE_PATH:-/var/lib/grafana/grafana.db}
host = ${GRAFANA_DB_HOST:-localhost:5432}
name = ${GRAFANA_DB_NAME:-grafana_db}
user = ${GRAFANA_DB_USER:-grafana_user}
password = ${GRAFANA_DB_PASSWORD}
ssl_mode = ${GRAFANA_DB_SSL_MODE:-disable}
max_idle_conn = 2
max_open_conn = 0
conn_max_lifetime = 14400
log_queries = false
cache_mode = private

[security]
admin_user = ${GRAFANA_ADMIN_USER:-admin}
admin_password = ${GRAFANA_ADMIN_PASSWORD}
secret_key = ${GRAFANA_SECRET_KEY}
login_remember_days = 7
cookie_username = grafana_user
cookie_remember_name = grafana_remember
disable_gravatar = true
allow_embedding = false
cookie_secure = ${GRAFANA_COOKIE_SECURE:-false}
cookie_samesite = ${GRAFANA_COOKIE_SAMESITE:-lax}
allow_sign_up = false
auto_assign_org = true
auto_assign_org_id = 1
auto_assign_org_role = Viewer
hide_version = true
disable_initial_admin_creation = false
angular_support_enabled = false

[unified_alerting]
enabled = true
execute_alerts = true
evaluation_timeout = 30s
max_attempts = 1
min_interval = 10s

[analytics]
reporting_enabled = false
check_for_updates = false

[log]
mode = console
level = ${GRAFANA_LOG_LEVEL:-info}

[users]
allow_sign_up = false
auto_assign_org = true
default_theme = ${GRAFANA_DEFAULT_THEME:-dark}
