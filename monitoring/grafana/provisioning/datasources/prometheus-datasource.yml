# Grafana Datasource Provisioning for Prometheus
# Automatically configures Prometheus connection on startup
# Environment-driven configuration following Critical Principles

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://${PROMETHEUS_HOST:-prometheus}:${PROMETHEUS_PORT:-9090}
    isDefault: true
    editable: false
    basicAuth: false
    withCredentials: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      alertmanagerUid: ""
      prometheusType: Prometheus
      cacheLevel: High
      disableRecordingRules: false
      incrementalQueryOverlapWindow: 10m
      queryTimeout: 60s
      timeInterval: ${PROMETHEUS_GLOBAL_SCRAPE_INTERVAL:-15s}
    secureJsonData: {}
    version: 1
    readonly: false
