# Docker Compose for Flash Arbitrage Bot
# Production-ready monitoring infrastructure
# ALL VALUES ENVIRONMENT-DRIVEN - NO HARDCODED VALUES

services:
  # Redis - Primary cache and session store
  redis:
    image: redis:7-alpine
    container_name: flash_arbitrage_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_EXPORTER_PASSWORD=${REDIS_EXPORTER_PASSWORD}
    command: >
      sh -c '
        echo "user default off" > /tmp/users.acl &&
        echo "user ${REDIS_USERNAME:-flash-arbitrage-bot} on >${REDIS_PASSWORD} ~* &* +@all" >> /tmp/users.acl &&
        echo "user ${REDIS_EXPORTER_USER:-redis-exporter} on >${REDIS_EXPORTER_PASSWORD} ~* &* +@read +info +ping +client +config +latency" >> /tmp/users.acl &&
        redis-server --aclfile /tmp/users.acl --appendonly yes
      '
    networks:
      - flash_arbitrage_network
    healthcheck:
      test: ['CMD', 'redis-cli', '--user', '${REDIS_USERNAME:-flash-arbitrage-bot}', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Exporter - Redis metrics for Prometheus
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: flash_arbitrage_redis_exporter
    restart: unless-stopped
    ports:
      - '${REDIS_EXPORTER_PORT:-9121}:9121'
    environment:
      - REDIS_ADDR=redis:${REDIS_PORT:-6379}
      - REDIS_USER=${REDIS_EXPORTER_USER:-redis-exporter}
      - REDIS_PASSWORD=${REDIS_EXPORTER_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - flash_arbitrage_network

  # PostgreSQL - Primary database
  postgres:
    image: postgres:14-alpine
    container_name: flash_arbitrage_postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ./infrastructure/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infrastructure/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./infrastructure/postgres/init-postgres.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-anthony}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-local=trust --auth-host=scram-sha-256
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD}
      - GRAFANA_DB_PASSWORD=${GRAFANA_DB_PASSWORD}
      - POSTGRES_EXPORTER_PASSWORD=${POSTGRES_EXPORTER_PASSWORD}
    command: >
      postgres 
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - flash_arbitrage_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-anthony}']
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Exporter - PostgreSQL metrics for Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: flash_arbitrage_postgres_exporter
    restart: unless-stopped
    ports:
      - '${POSTGRES_EXPORTER_PORT:-9187}:9187'
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_EXPORTER_USER:-postgres_exporter}:${POSTGRES_EXPORTER_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flash_arbitrage_network

  # Prometheus - Metrics collection and alerting
  prometheus:
    image: prom/prometheus:latest
    container_name: flash_arbitrage_prometheus
    restart: unless-stopped
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-50GB}'
      - '--storage.tsdb.wal-compression'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.external-url=${PROMETHEUS_EXTERNAL_URL:-http://localhost:9090}'
    depends_on:
      - redis-exporter
      - postgres-exporter
    networks:
      - flash_arbitrage_network

  # Grafana - Dashboards and visualization
  grafana:
    image: grafana/grafana:latest
    container_name: flash_arbitrage_grafana
    restart: unless-stopped
    ports:
      - '${GRAFANA_HTTP_PORT:-3000}:3000'
    volumes:
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY}
      - GF_DATABASE_TYPE=${GRAFANA_DATABASE_TYPE:-sqlite3}
      - GF_DATABASE_PATH=${GRAFANA_DATABASE_PATH:-/var/lib/grafana/grafana.db}
    depends_on:
      - prometheus
      - postgres
    networks:
      - flash_arbitrage_network

# Persistent data volumes
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Isolated network for the stack
networks:
  flash_arbitrage_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
